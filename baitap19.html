  <main class="container">
    <h1>Memory Card Flip Game (Bài 19)</h1>
    <p>Ghép đôi 8 thẻ (4 cặp). Click để lật, 2 thẻ lật cùng lúc để so sánh.</p>

    <div class="controls">
      <div class="moves">Moves: <span id="moves">0</span></div>
      <button id="reset" class="btn">Reset</button>
    </div>

    <section class="grid" id="board" aria-label="Bàn chơi"></section>

    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-box">
        <h2>Chúc mừng!</h2>
        <p>Bạn đã thắng trong <span id="final-moves">0</span> lượt.</p>
        <button id="play-again" class="btn">Chơi lại</button>
      </div>
    </div>
  </main>
  <script src="js/baitap19.js" defer></script>
